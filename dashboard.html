<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Dashboard - Visitor System</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard-layout {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .header-menu {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .kpi-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .kpi-icon {
            background: #eff6ff;
            color: var(--primary);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .kpi-text h3 {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            border: none;
            padding: 0;
        }
        .kpi-text p {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-dark);
        }
        
        .chart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }
        .chart-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }
        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-dark);
        }
        
        @media (max-width: 900px) {
            .chart-grid { grid-template-columns: 1fr; }
            .kpi-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<script>
    document.body.style.display = 'none';
    fetch('api_auth.php?action=check').then(r=>r.json()).then(res => {
        if(res.status !== 'success' || (res.session.role === 'Sales')) {
            window.location.href = 'login.html';
        } else {
            document.body.style.display = 'block';
            document.getElementById('userNameDisplay').innerText = res.session.name;
        }
    });
</script>

<div class="container dashboard-layout">
    <div class="header-menu">
        <div>
            <h1 style="color:var(--text-dark); font-size: 2rem; margin:0;">Executive Analytics</h1>
            <p style="color:var(--text-muted); margin:0;">Real-time visitor processing metrics</p>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
             <span id="userNameDisplay" style="font-weight:600; color:var(--text-muted)">...</span>
             <a href="portal.html" class="btn btn-sm btn-outline" style="border:1px solid var(--border); color:var(--text-dark); background:white;">🏠 Back to Portal</a>
             <a href="admin.html" class="btn btn-secondary"><i data-lucide="list"></i> Approval List</a>
             <button class="btn btn-sm btn-outline" style="border:none;" onclick="fetch('api_auth.php?action=logout', {method:'POST'}).then(()=>window.location.href='login.html')">Logout</button>
        </div>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid">
        <div class="kpi-card">
            <div class="kpi-icon"><i data-lucide="users" style="width:30px;height:30px;"></i></div>
            <div class="kpi-text">
                <h3>Total Requests YTD</h3>
                <p id="kpiTotal">0</p>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon" style="background:#ecfdf5; color:#10b981;"><i data-lucide="check-circle" style="width:30px;height:30px;"></i></div>
            <div class="kpi-text">
                <h3>Final Confirmed</h3>
                <p id="kpiApproved">0</p>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon" style="background:#fefce8; color:#eab308;"><i data-lucide="calendar" style="width:30px;height:30px;"></i></div>
            <div class="kpi-text">
                <h3>Next Upcoming Tour</h3>
                <p id="kpiNext" style="font-size: 1.2rem; line-height:30px;">No Data</p>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <div class="chart-grid">
        <div class="chart-card">
            <div class="chart-title">Monthly Visitor Requests (<span id="txtYear">2026</span>)</div>
            <canvas id="barChart" height="100"></canvas>
        </div>
        
        <div style="display:flex; flex-direction:column; gap:1.5rem;">
            <div class="chart-card">
                <div class="chart-title">Visitor Categories</div>
                <div style="position:relative; height: 180px; width: 100%;">
                     <canvas id="pieChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">Current Approval Statuses</div>
                <div style="position:relative; height: 180px; width: 100%;">
                     <canvas id="doughnutChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();

    const chartColors = [
        '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4'
    ];

    document.addEventListener('DOMContentLoaded', async () => {
        const res = await fetch('api_dashboard.php');
        const data = await res.json();
        
        if(data.status !== 'success') {
            alert('Failed to load dashboard data: ' + data.message);
            return;
        }

        const d = data;

        // Populate KPIs
        document.getElementById('txtYear').innerText = d.params.year;
        document.getElementById('kpiTotal').innerText = d.kpis.totalRequests;
        document.getElementById('kpiApproved').innerText = d.kpis.totalApproved;
        
        if(d.kpis.nextVisit !== 'None') {
            document.getElementById('kpiNext').innerText = new Date(d.kpis.nextVisit).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
        } else {
            document.getElementById('kpiNext').innerText = 'None';
        }

        // Initialize Charts
        initBarChart(d.charts.monthly.labels, d.charts.monthly.data);
        initPieChart(d.charts.category.labels, d.charts.category.data);
        initDoughnutChart(d.charts.status.labels, d.charts.status.data);
    });

    function initBarChart(labels, data) {
        new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '# of Requests',
                    data: data,
                    backgroundColor: '#2563eb',
                    borderRadius: 6,
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                }
            }
        });
    }

    function initPieChart(labels, data) {
        new Chart(document.getElementById('pieChart'), {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: chartColors,
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'right', labels: { boxWidth: 12, font: {size: 11} } }
                }
            }
        });
    }

    function initDoughnutChart(labels, data) {
        new Chart(document.getElementById('doughnutChart'), {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: chartColors,
                    borderWidth: 1,
                    cutout: '70%'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                 plugins: {
                    legend: { position: 'right', labels: { boxWidth: 12, font: {size: 11} } }
                }
            }
        });
    }
</script>
</body>
</html>
